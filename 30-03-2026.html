<script>
         let hero = "Happy hero birthday hero ram charan";
         console.log(hero.includes("charan"))
         console.log(hero.indexOf("birthday"))
         console.log(hero.indexOf("no"))
         console.log(hero.lastIndexOf("hero"))
         console.log(hero.startsWith("Happy"))
         console.log(hero.startsWith("hero"))
         console.log(hero.endsWith("charan"))

</script>

//Character access//

<script>
         let ind = "Deshojusandeep";
         console.log(ind[0]);
         console.log(ind[1]);
         console.log(ind[2]);
         console.log(ind[3]);
         console.log(ind[4]);
         console.log(ind[5]);

         console.log(ind.charAt(3));
         console.log(ind.charAt(9));


         console.log(ind.at(0));
         console.log(ind.at(1));
         console.log(ind.at(-1)); //last letter//
         
         //0r//

         console.log(ind[ind.length-1]);


         console.log(ind.at(-2)); //last 2nd//
</script>



<script>
        let a = "hello";
        let b = "hello";
        console.log(a == b);
        console.log(a === b);

        let a1 = "hello";
        let b1 = "Hello";
        console.log(a1 === b1);
        console.log(a1.toLowerCase() === b1.toUpperCase());
</script>
