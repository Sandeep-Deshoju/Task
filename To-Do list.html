<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple To-Do List</title>

    <style>
    body {
      font-family: Arial;
      background-color: #fecece;
      text-align: center;
      margin-top: 50px;
    }

    h1 {
      color: #333;
      font-size: 60px;
      padding-top: 200px;

    }

    input {
      padding: 8px;
      width: 300px;
      height: 50px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 8px 12px;
      margin-left: 5px;
      border: none;
      background-color: #000000;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      width: 150px;
      height: 60px;
    }

    button:hover {
      background-color: #45a049;
    }

    ul {
      margin-top: 20px;
      padding: 0;
    }

    li {
      list-style: none;
      background: white;
      margin: 10px auto;
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 0 5px #ccc;
    }

    li button {
      background-color: red;
    }

    li button:hover {
      background-color: darkred;
    }

    
  </style>

</head>


<body>
      <h1>My Own To-Do List</h1>

  <input id="taskInput" placeholder="Enter Your task Name">
  <button onclick="addTask()" style="font-size: 30px;">Add</button>

  <ul id="list"></ul>

  <script>

    function addTask() {
      let input = document.getElementById("taskInput");
      let value = input.value;

      if (value === "") {
        alert("Enter a task!");
        return;
      }

      let li = document.createElement("li");
      li.innerText = value;

      let deleteBtn = document.createElement("button");
      deleteBtn.innerText = "Delete";

      deleteBtn.onclick = function () {
        li.remove();
      };

      li.appendChild(deleteBtn);

      document.getElementById("list").appendChild(li);

      input.value = "";
    }
  </script>
    
</body>
</html>
